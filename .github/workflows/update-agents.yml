name: Update agent pricing

# Re-checks each vendor pricing page weekly. When the detected price signals
# change, the snapshot file changes, and this workflow opens a pull request so
# a human can confirm the real numbers and update data/agents.json.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pricing monitor
        run: node scripts/update-agents.mjs | tee /tmp/agent-pricing-report.txt

      - name: Open PR if pricing signals changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: data/agents.snapshot.json
          branch: auto/agent-pricing-update
          commit-message: "chore: refresh agent pricing snapshot"
          title: "Agent pricing changed — please verify"
          body-path: /tmp/agent-pricing-report.txt
          delete-branch: true
          labels: pricing, automated
